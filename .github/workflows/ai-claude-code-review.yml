name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  actions: read
  checks: write
  contents: read
  issues: write
  pull-requests: write
  security-events: read

jobs:
  claude-review:
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'ai-review')
    runs-on: ubuntu-latest
    timeout-minutes: 33

    env:
      AI_CLOUD_REVIEW_PROMPT: ${{ secrets.AI_CLOUD_REVIEW_PROMPT || vars.AI_CLOUD_REVIEW_PROMPT }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Verify Claude settings
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          test -n "$CLAUDE_CODE_OAUTH_TOKEN" || {
            echo "::error::Set the CLAUDE_CODE_OAUTH_TOKEN repository or organization secret."
            exit 1
          }
          test -n "$AI_CLOUD_REVIEW_PROMPT" || {
            echo "::error::Set AI_CLOUD_REVIEW_PROMPT as a secret or variable."
            exit 1
          }

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 150

      - name: Run Claude Code Review
        id: claude-review
        timeout-minutes: 32
        uses: anthropics/claude-code-action@23e4ee05df2c5aefd801f51b83c81cd4215be7e9 # v1.0.120
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ env.AI_CLOUD_REVIEW_PROMPT }}
          claude_args: |
            --max-turns 300
            --model sonnet
            --fallback-model haiku
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr:*),Bash(gh issue:*),Bash(gh search:*)"
