name: Build

on:
  pull_request:
    # The repository uses ff-only merges, but PR checks must still run on the
    # pull_request merge ref so branch protection can gate the exact mergeable tree.
  push:
    paths-ignore:
      - '**-validation.yml'
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**/actionlint**'
      - '**/pr-**.yml'
      - '**/release.yml'
      - '**dependabot.yml'

permissions:
  contents: read
  # required for all workflows (CodeQL)
  security-events: write
  # required for workflows in private repositories (CodeQL)
  actions: read
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  #GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: "^(?!(classpath)).*"
  DEPENDENCY_GRAPH_INCLUDE_PROJECTS: "^:(?!(buildSrc|test|check)).*"

jobs:
  buildAndCheck:
    strategy:
      fail-fast: false
      matrix:
        # JDK 21 needed by IntelliJ Platform 2026.* targets (S12) and unblocks the
        # CodeQL job whose `matrix.java != '23'` gate (lines below) was dead code
        # while the matrix had only a single JDK. Multi-JDK shake-out is a free win.
        java: [ '21', '23' ]
        os: [ 'macos', 'windows', 'ubuntu' ]
        # CodeQL supports ['c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift']
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support.
        language: [ 'java-kotlin' ]

    name: 'Build and check on ${{ matrix.os }} / JDK ${{ matrix.java }}'
    timeout-minutes: 30
    runs-on: '${{ matrix.os }}-latest'
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    env:
      GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '${{ matrix.java }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: ${{ matrix.os == 'windows' }} # super slow on Windows.
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          dependency-graph: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && 'generate-and-submit' || 'disabled'}}
          add-job-summary-as-pr-comment: on-failure
          artifact-retention-days: 1

      # TODO: If it's a "build(deps): ..." commit, then run the dependency review actions,
      #  amend the `dependencyGuardBaseline` and `kotlinUpgradeYarnLock` task results

      - name: Initialize CodeQL
        if: matrix.os == 'ubuntu' && matrix.java != '23'
        uses: github/codeql-action/init@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list with "+" to use these queries, and those in the config file.
          #
          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended, security-and-quality

      - name: 'Build and check plugin itself'
        timeout-minutes: 18
        run: ./gradlew build assemble check --continue --stacktrace --scan

      - name: Upload sarif report (Detekt)
        if: always() && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        continue-on-error: true
        with:
          sarif_file: build/detekt-merged.sarif
          category: detekt

      - name: Upload sarif report (Lint)
        if: always() && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        continue-on-error: true
        with:
          sarif_file: build/lint-merged.sarif
          category: lint

      - name: 'Run check-gradle-plugin'
        if: always()
        timeout-minutes: 6
        working-directory: checks/gradle-plugin
        run: ./gradlew build assemble check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: 'Run check-kmp'
        if: always()
        timeout-minutes: 12
        working-directory: checks/kmp
        run: ./gradlew build assemble check printKotlinSourceSetsGraph --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: 'Run check-compose-desktop'
        if: always()
        timeout-minutes: 14
        working-directory: checks/compose-desktop
        run: ./gradlew build assemble check packageReleaseDistributionForCurrentOS --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: 'Run check-android'
        if: always()
        timeout-minutes: 8
        working-directory: checks/android
        # Non-KMP `com.android.library` integration check exercising the legacy AGP
        # `LibraryExtension`-based `setupAndroidCommon` path under AGP 9 (built-in
        # Kotlin). Lost CI coverage when `checks/kmp` migrated to the AGP-9 KMP+Android
        # plugin in 0.14.0; restored here so the non-KMP setup line stays falsified
        # against every plugin/Kotlin/AGP bump.
        run: ./gradlew build assemble check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: 'Run self check'
        timeout-minutes: 4
        working-directory: self
        run: ./gradlew build assemble check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Upload the build report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: '${{ matrix.os }}-jdk-${{ matrix.java }}-build-report'
          path: |
            **/build/logs/
            **/build/reports/
            **/build/output/
            build/*-merged.*
          compression-level: 9

      - name: Perform CodeQL Analysis
        if: matrix.os == 'ubuntu' && matrix.java != '23'
        timeout-minutes: 6
        uses: github/codeql-action/analyze@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7 # v4.35.4
        with:
          category: "/language:${{matrix.language}}"

      - name: "Post result in PR comment"
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        if: github.event_name == 'pull_request' && failure()
        env:
          OS: ${{ matrix.os }}
          GH_WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { OS, GH_WORKFLOW, RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `❌ ${GH_WORKFLOW} [failed](${RUN_URL}) on ${OS}.`,
            })


