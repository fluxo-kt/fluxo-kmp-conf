name: Build

on:
  pull_request:
    # The repository uses ff-only merges, but PR checks must still run on the
    # pull_request merge ref so branch protection can gate the exact mergeable tree.
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**-validation.yml'
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**/actionlint**'
      - '**/pr-**.yml'
      - '**/release.yml'
      - '**dependabot.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # required for all workflows (CodeQL)
  security-events: write
  # required for workflows in private repositories (CodeQL)
  actions: read
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  #GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: "^(?!(classpath)).*"
  DEPENDENCY_GRAPH_INCLUDE_PROJECTS: "^:(?!(buildSrc|test|check)).*"

jobs:
  buildAndCheck:
    strategy:
      fail-fast: false
      matrix:
        # JDK 21 needed by IntelliJ Platform 2026.* targets (S12). JDK 23 keeps
        # early-warning coverage for newer daemon/toolchain behavior.
        java: ['21', '23']
        os: ['macos', 'windows', 'ubuntu']
    name: 'Build and check on ${{ matrix.os }} / JDK ${{ matrix.java }}'
    # Keep the job budget above the sum of the guarded Gradle/check steps. Otherwise
    # a slow but healthy matrix leg can be cancelled after its checks already passed.
    timeout-minutes: 90
    runs-on: '${{ matrix.os }}-latest'
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci skip') }}
    env:
      GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '${{ matrix.java }}'

      - name: Setup Gradle
        continue-on-error: ${{ matrix.os == 'windows' }}
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          dependency-graph: disabled
          add-job-summary-as-pr-comment: on-failure
          artifact-retention-days: 1

      - name: 'Build and check plugin itself'
        timeout-minutes: 18
        # `compatibilityTest` is excluded here and runs once in `integrationChecks`
        # instead: it spawns ~19 nested TestKit consumer builds (AGP/KMP/Compose),
        # is OS- and daemon-JDK-independent (fixtures pin their own toolchain), and
        # took >15 min — so running it on every OS×JDK cell is pure redundancy that
        # blew this step's budget. `verifyCompatibilityStatic` (the OS-path check)
        # stays in `check` and still runs on every cell.
        run: ./gradlew build assemble check -x compatibilityTest --continue --stacktrace --scan

      - name: Upload sarif report (Detekt)
        if: always() && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        continue-on-error: true
        with:
          sarif_file: build/detekt-merged.sarif
          category: detekt

      - name: Upload sarif report (Lint)
        if: always() && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        continue-on-error: true
        with:
          sarif_file: build/lint-merged.sarif
          category: lint

      - name: Upload the build report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: '${{ matrix.os }}-jdk-${{ matrix.java }}-build-report'
          path: |
            **/build/logs/
            **/build/reports/
            **/build/output/
            build/*-merged.*
          compression-level: 9

      - name: "Post result in PR comment"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request' && failure()
        env:
          OS: ${{ matrix.os }}
          GH_WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { OS, GH_WORKFLOW, RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `❌ ${GH_WORKFLOW} [failed](${RUN_URL}) on ${OS}.`,
            })

  integrationChecks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: check-gradle-plugin
            directory: checks/gradle-plugin
            command: ./gradlew build assemble check --continue --stacktrace --scan
            timeout: 6
          - name: check-kmp
            directory: checks/kmp
            command: ./gradlew build assemble check printKotlinSourceSetsGraph --continue --stacktrace --scan
            timeout: 12
          - name: check-compose-desktop
            directory: checks/compose-desktop
            command: ./gradlew build assemble check packageReleaseDistributionForCurrentOS --continue --stacktrace --scan
            timeout: 14
          # Keeps the legacy non-KMP Android library path covered after checks/kmp
          # moved to the AGP-9 KMP+Android plugin line.
          - name: check-android
            directory: checks/android
            command: ./gradlew build assemble check --continue --stacktrace --scan
            timeout: 8
          - name: self-check
            directory: self
            command: ./gradlew build assemble check --continue --stacktrace --scan
            timeout: 4
          # The OS-independent compatibility TestKit harness, excluded from the
          # per-OS×JDK `build assemble check` step and run once here instead. ~19
          # nested consumer builds, sequential; generous timeout reflects the real
          # cost (it outgrew the 18-min per-cell budget when run 6×). Measured
          # ~19 min wall-time on a fast multi-core host; the budget carries ~2.4×
          # margin for the 4-vCPU runner and the cold (read-only on non-default
          # branches) Gradle cache that re-downloads every pinned AGP/Kotlin/Compose.
          - name: compatibility-test
            directory: .
            command: ./gradlew :plugin:compatibilityTest --continue --stacktrace --scan
            timeout: 45
    name: 'Integration check / ${{ matrix.name }}'
    # Above the largest leg step (compatibility-test, 45) plus checkout/JDK/Gradle
    # setup overhead, so a healthy-but-slow leg is never cancelled mid-flight.
    timeout-minutes: 55
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci skip') }}
    env:
      GITHUB_DEPENDENCY_GRAPH_ENABLED: false
      GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          dependency-graph: disabled
          add-job-summary-as-pr-comment: on-failure
          artifact-retention-days: 1

      - name: 'Run ${{ matrix.name }}'
        timeout-minutes: ${{ matrix.timeout }}
        working-directory: ${{ matrix.directory }}
        run: ${{ matrix.command }}

      - name: Upload the integration build report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: '${{ matrix.name }}-build-report'
          path: |
            ${{ matrix.directory }}/**/build/logs/
            ${{ matrix.directory }}/**/build/reports/
            ${{ matrix.directory }}/**/build/output/
          compression-level: 9

      - name: "Post result in PR comment"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request' && failure()
        env:
          CHECK_NAME: ${{ matrix.name }}
          GH_WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { CHECK_NAME, GH_WORKFLOW, RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `❌ ${GH_WORKFLOW} [failed](${RUN_URL}) on ${CHECK_NAME}.`,
            })

  codeql:
    name: CodeQL
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'ci skip') }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          dependency-graph: disabled
          add-job-summary-as-pr-comment: on-failure
          artifact-retention-days: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: java-kotlin
          build-mode: manual
          dependency-caching: restore

      - name: Compile plugin for CodeQL
        timeout-minutes: 10
        run: ./gradlew :plugin:compileKotlin --rerun-tasks --continue --stacktrace

      - name: Perform CodeQL Analysis
        timeout-minutes: 12
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: /language:java-kotlin


