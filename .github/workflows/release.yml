name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI: true
  RELEASE: true
  BUILD_NUMBER: ${{ github.run_number }}
  GRADLE_OPTS: |
    -Dorg.gradle.daemon=false
    -Dorg.gradle.unsafe.watch-fs=false
    -Dorg.gradle.vfs.watch=false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      tag: ${{ steps.verify.outputs.tag }}
      prerelease: ${{ steps.verify.outputs.prerelease }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify release invariants
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/verify-release.sh

  publish_release:
    if: github.repository == 'fluxo-kt/fluxo-kmp-conf'
    needs: verify_release
    runs-on: macos-latest
    env:
      SCM_TAG: ${{ needs.verify_release.outputs.tag }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 23

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true
          cache-read-only: true

      - name: Verify publication secrets
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          missing=()
          for name in \
            GRADLE_PUBLISH_KEY \
            GRADLE_PUBLISH_SECRET \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            SIGNING_KEY \
            SIGNING_PASSWORD
          do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required release secrets: %s\n' "${missing[*]}"
            exit 1
          fi
          if [[ "$SIGNING_KEY" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "::error::SIGNING_KEY must be the ASCII-armored private PGP key block."
            exit 1
          fi

      - name: Normalize publication signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: .github/scripts/export-release-signing-key.sh

      - name: Write publication credentials
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
        run: |
          umask 077
          mkdir -p ~/.gradle
          {
            printf 'gradle.publish.key=%s\n' "$GRADLE_PUBLISH_KEY"
            printf 'gradle.publish.secret=%s\n' "$GRADLE_PUBLISH_SECRET"
            printf 'mavenCentralUsername=%s\n' "$MAVEN_CENTRAL_USERNAME"
            printf 'mavenCentralPassword=%s\n' "$MAVEN_CENTRAL_PASSWORD"
            if [[ -n "${SIGNING_KEY_ID:-}" ]]; then
              printf 'signingInMemoryKeyId=%s\n' "$SIGNING_KEY_ID"
            fi
          } >> ~/.gradle/gradle.properties

      - name: Verify release build
        run: >
          ./gradlew build assemble check
          --no-build-cache --no-configuration-cache --stacktrace

      - name: Validate Plugin Portal publication
        run: >
          ./gradlew :plugin:verifyPluginPortalMetadata publishPlugins --validate-only
          --no-build-cache --no-configuration-cache --stacktrace

      - name: Publish Maven Central and Plugin Portal
        run: >
          ./gradlew publishAndReleaseToMavenCentral publishPlugins
          --no-build-cache --no-configuration-cache --stacktrace

      - name: Verify Plugin Portal page
        run: .github/scripts/verify-plugin-portal-page.sh "${{ needs.verify_release.outputs.version }}"

  gh_release:
    needs:
      - verify_release
      - publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare release settings
        env:
          RELEASE_PRE: ${{ needs.verify_release.outputs.prerelease }}
        run: |
          # Pre-release detection is single-sourced in verify-release.sh.
          [[ "$RELEASE_PRE" == "true" ]] && RELEASE_SUFFIX=" (pre release)" || RELEASE_SUFFIX=""
          {
            echo "RELEASE_PRE=$RELEASE_PRE"
            echo "RELEASE_SUFFIX=$RELEASE_SUFFIX"
          } >> "$GITHUB_ENV"

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify_release.outputs.tag }}
          RELEASE_PRE: ${{ env.RELEASE_PRE }}
          RELEASE_SUFFIX: ${{ env.RELEASE_SUFFIX }}
        run: .github/scripts/create-github-release.sh

  # Keep `main` (JitPack main-SNAPSHOT + the branch main-tracking consumers
  # follow) from rotting behind published releases. Stable releases only —
  # pre-releases must not move the consumer-facing main. Active by default with
  # the built-in GITHUB_TOKEN: if it cannot fast-forward protected main, the job
  # FAILS LOUDLY so a forgotten promotion can't pass unnoticed (the rot's root
  # cause). Provisioning MAIN_PROMOTE_TOKEN (a main branch-protection bypass
  # actor) upgrades that to silent auto-promotion. promote-main.sh never weakens
  # protection. See promote-main.sh + promote-main.test.sh.
  promote_main:
    needs:
      - verify_release
      - publish_release
      - gh_release
    if: >-
      github.repository == 'fluxo-kt/fluxo-kmp-conf' &&
      needs.verify_release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fast-forward main to the released tag
        env:
          GH_TOKEN: ${{ secrets.MAIN_PROMOTE_TOKEN || github.token }}
          TAG: ${{ needs.verify_release.outputs.tag }}
        run: .github/scripts/promote-main.sh
