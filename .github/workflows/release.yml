name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI: true
  RELEASE: true
  BUILD_NUMBER: ${{ github.run_number }}
  GRADLE_OPTS: |
    -Dorg.gradle.daemon=false
    -Dorg.gradle.unsafe.watch-fs=false
    -Dorg.gradle.vfs.watch=false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      tag: ${{ steps.verify.outputs.tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify release invariants
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/verify-release.sh

  publish_release:
    if: github.repository == 'fluxo-kt/fluxo-kmp-conf'
    needs: verify_release
    runs-on: macos-latest
    env:
      SCM_TAG: ${{ needs.verify_release.outputs.tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 23

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true
          cache-read-only: true

      - name: Verify publication secrets
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          missing=()
          for name in \
            GRADLE_PUBLISH_KEY \
            GRADLE_PUBLISH_SECRET \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            SIGNING_KEY \
            SIGNING_PASSWORD
          do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required release secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Write publication credentials
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          umask 077
          mkdir -p ~/.gradle
          {
            printf 'gradle.publish.key=%s\n' "$GRADLE_PUBLISH_KEY"
            printf 'gradle.publish.secret=%s\n' "$GRADLE_PUBLISH_SECRET"
            printf 'mavenCentralUsername=%s\n' "$MAVEN_CENTRAL_USERNAME"
            printf 'mavenCentralPassword=%s\n' "$MAVEN_CENTRAL_PASSWORD"
          } >> ~/.gradle/gradle.properties

      - name: Verify release build
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: >
          ./gradlew build assemble check
          --no-build-cache --no-configuration-cache --stacktrace

      - name: Validate Plugin Portal publication
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: >
          ./gradlew publishPlugins --validate-only
          --no-build-cache --no-configuration-cache --stacktrace

      - name: Publish Maven Central and Plugin Portal
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: >
          ./gradlew publishAndReleaseToMavenCentral publishPlugins
          --no-build-cache --no-configuration-cache --stacktrace

  gh_release:
    needs:
      - verify_release
      - publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare release settings
        run: |
          echo "GITHUB_REF_NAME: $GITHUB_REF_NAME"
          RELEASE_PRE=false
          RELEASE_SUFFIX=""
          # Check release type
          if [[ "$GITHUB_REF_NAME" =~ 'alpha' || "$GITHUB_REF_NAME" =~ 'beta' || "$GITHUB_REF_NAME" =~ 'rc' ]]; then
            echo "This is a pre-release!"
            RELEASE_PRE=true
            RELEASE_SUFFIX=" (pre release)"
          fi
          # shellcheck disable=SC2086
          echo "RELEASE_PRE=$RELEASE_PRE" >> $GITHUB_ENV
          # shellcheck disable=SC2086
          echo "RELEASE_SUFFIX=$RELEASE_SUFFIX" >> $GITHUB_ENV

      - name: GitHub Release
        # https://github.com/anton-yurchenko/git-release#readme
        # Pinned to v6.0.0 (manifest-list digest, multi-arch). Bump by
        # resolving the new digest with:
        #   curl -sL "https://hub.docker.com/v2/repositories/antonyurchenko/git-release/tags/<tag>" | jq .digest
        uses: docker://antonyurchenko/git-release@sha256:b3a7d6a87981f8ed455e6b44c702e55afd95b3e628c324d7fd4f6f85728f792b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT_RELEASE: "true"
          PRE_RELEASE: "${{ env.RELEASE_PRE }}"
          RELEASE_NAME_SUFFIX: "${{ env.RELEASE_SUFFIX }}"
          CHANGELOG_FILE: "CHANGELOG.md"
          ALLOW_EMPTY_CHANGELOG: "false"

# References
# https://github.com/studiometa/vue-mapbox-gl/blob/8c3ca5a/.github/workflows/release.yml#L26
