name: Validate Workflows

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '.github/actions/**.yml'
      - '.github/actions/**.yaml'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request:
    paths:
      - '.github/actions/**.yml'
      - '.github/actions/**.yaml'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate action metadata YAML
        shell: bash
        run: |
          git ls-files '.github/actions/*.yml' '.github/actions/*.yaml' '.github/actions/**/*.yml' '.github/actions/**/*.yaml' \
            | xargs -r ruby -e 'require "yaml"; ARGV.each { |file| YAML.load_file(file) }'

      - uses: ./.github/actions/actionlint
