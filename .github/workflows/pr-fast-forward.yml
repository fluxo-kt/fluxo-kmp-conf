name: PR Fast-Forward Merge

on:
  issue_comment:
    types: [ created ]

permissions:
  contents: write
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

jobs:
  pr-fast-forward:
    # Only run if the PR comment contains the '/fast-forward' command or equals a '/ff' command.
    # Only run if a user with write permissions made the comment.
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/ff' || contains(github.event.comment.body, '/fast-forward')) &&
      (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: React to the comment right away
        uses: dkershner6/reaction-action@97ede302a1b145b3739dec3ca84a489a34ef48b5 # v2.2.1
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reaction: "rocket"

      - name: Fast-forward and push
        uses: sequoia-pgp/fast-forward@ea7628bedcb0b0b96e94383ada458d812fca4979 # v1.0.0
        with:
          merge: true
          # To reduce the workflow's verbosity, use 'on-error'
          # to only post a comment when an error occurs, or 'never' to
          # never post a comment.
          # (Information is always available in the step's summary.)
          comment: always
