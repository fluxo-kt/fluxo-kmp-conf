name: Claude Comment Action

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  actions: read
  checks: write
  contents: write
  issues: write
  pull-requests: write
  security-events: read

jobs:
  claude-comment:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        (
          github.event.issue.author_association == 'OWNER' ||
          github.event.issue.author_association == 'MEMBER' ||
          github.event.issue.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 33

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Verify Claude settings
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          test -n "$CLAUDE_CODE_OAUTH_TOKEN" || {
            echo "::error::Set the CLAUDE_CODE_OAUTH_TOKEN repository or organization secret."
            exit 1
          }

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 150

      - name: React to the comment right away
        uses: dkershner6/reaction-action@97ede302a1b145b3739dec3ca84a489a34ef48b5 # v2.2.1
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reaction: '+1'

      - name: Run Claude Code
        id: claude
        timeout-minutes: 32
        uses: anthropics/claude-code-action@23e4ee05df2c5aefd801f51b83c81cd4215be7e9 # v1.0.120
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_commit_signing: true
          additional_permissions: |
            actions: read
          claude_args: |
            --max-turns 250
            --model sonnet
            --fallback-model haiku
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr:*),Bash(gh issue:*),Bash(gh search:*)"
