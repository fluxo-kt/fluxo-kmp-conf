name: Dependency Submission

on:
  push:
    paths-ignore:
      - '**-validation.yml'
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**/actionlint**'
      - '**/pr-**.yml'
      - '**/release.yml'
      - '**dependabot.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}

jobs:
  dependency-submission:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false
          # Scope the graph to the CONSUMER surface: the published runtime classpath.
          # compileOnly tooling (AGP -> bundletool -> jose4j, lint -> bouncycastle,
          # detekt, ...) resolves in compileClasspath but never ships to consumers;
          # including it floods Dependabot with build-only CVEs that mask the real
          # consumer-facing ones. The prior "^(?!(classpath)).*" only dropped the
          # buildscript `classpath` config, still leaking all of compileClasspath.
          # Anchored ^...$ so it cannot partial-match testRuntimeClasspath et al.
          dependency-graph-include-configurations: "^runtimeClasspath$"
          dependency-graph-include-projects: "^:(?!(buildSrc|test|check)).*"
          artifact-retention-days: 1
